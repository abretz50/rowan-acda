<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000">
  <defs>
    <!-- Colors -->
    <style>
      :root {
        --maroon: #7A0E12; /* adjustable title color */
        --ink: #0E0E0E;    /* microphone/stars */
      }
      .maroon { fill: var(--maroon); }
      .ink-fill { fill: var(--ink); }
      .ink-stroke { stroke: var(--ink); stroke-width: 18; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    </style>

    <!-- Arc path for the top text -->
    <path id="arc" d="M 140 420
                      A 360 360 0 0 1 860 420" />
  </defs>

  <!-- Background (transparent) -->
  <rect x="0" y="0" width="100%" height="100%" fill="none"/>

  <!-- Arched text -->
  <g aria-label="ROWAN ACDA" font-family="Impact, Anton, 'Arial Black', sans-serif" font-weight="800" font-size="140" letter-spacing="8">
    <text class="maroon">
      <textPath href="#arc" startOffset="50%" text-anchor="middle">ROWAN ACDA</textPath>
    </text>
  </g>

  <!-- Microphone (stylized vintage dynamic mic) -->
  <g id="mic" transform="translate(500, 625)">
    <!-- Body shadow -->
    <g transform="translate(-110, -205) scale(1.1)">
      <!-- Head (rounded capsule) -->
      <rect x="110" y="60" rx="70" ry="70" width="300" height="230" class="ink-fill"/>
      <!-- Grill slots -->
      <g class="ink-stroke">
        <path d="M140,115 h240" />
        <path d="M140,155 h240" />
        <path d="M140,195 h240" />
        <path d="M140,235 h240" />
      </g>

      <!-- Side bands -->
      <rect x="100" y="75" width="20" height="200" class="ink-fill"/>
      <rect x="410" y="75" width="20" height="200" class="ink-fill"/>

      <!-- Lower ring -->
      <rect x="160" y="290" width="200" height="35" class="ink-fill"/>
      <!-- Stem -->
      <rect x="235" y="325" width="50" height="130" class="ink-fill"/>
      <!-- Pivot block -->
      <rect x="190" y="455" width="140" height="40" rx="8" class="ink-fill"/>
      <!-- Lower stem -->
      <rect x="240" y="495" width="40" height="140" class="ink-fill"/>
      <!-- Base -->
      <path d="M160,650 h160 a100,55 0 0 1 100,55 v10 h-360 v-10 a100,55 0 0 1 100,-55 z" class="ink-fill"/>
    </g>
  </g>

  <!-- Sparkles -->
  <g id="sparkles" class="ink-fill">
    <!-- left small -->
    <g transform="translate(250,710) scale(0.9) rotate(15)">
      <rect x="-5" y="-25" width="10" height="50"/>
      <rect x="-25" y="-5" width="50" height="10"/>
    </g>
    <!-- bottom right -->
    <g transform="translate(720,770) scale(1.1) rotate(20)">
      <rect x="-6" y="-30" width="12" height="60"/>
      <rect x="-30" y="-6" width="60" height="12"/>
    </g>
    <!-- mid-right tiny -->
    <g transform="translate(760,605) scale(0.55) rotate(30)">
      <rect x="-5" y="-25" width="10" height="50"/>
      <rect x="-25" y="-5" width="50" height="10"/>
    </g>
  </g>

  <!-- Optional subtle drop shadow for text (off by default) -->
  <!-- <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
       <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.25"/>
     </filter>
     <use href="#arc" filter="url(#shadow)"/> -->
</svg>
