<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>E-Board Dashboard | Rowan ACDA</title>
  <link rel="icon" type="image/svg+xml" href="images/logo.svg"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css"/>
  <script defer src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script defer src="js/eboard-dash.js"></script>
  <style>
    /* simple header bar just for the dash */
    .dash-top { display:flex; align-items:center; justify-content:space-between; gap:12px;
      padding:12px 16px; background:var(--navbar-bg,#D6CE8A); border-bottom:1px solid var(--border); }
    .dash-top .title { font-weight:700 }
    .dash-actions{ display:flex; gap:10px; align-items:center }
  </style>
</head>
<body>
  <header class="dash-top">
    <div class="title">E-Board Dashboard</div>
    <div class="dash-actions">
      <a class="btn btn-ghost" href="account.html">Back to My Account</a>
      <button id="logoutBtn" class="btn btn-ghost">Log out</button>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h1>Create Event</h1>
      <form id="createForm" class="stack" style="margin-top:16px">
        <label>Title
          <input type="text" id="title" required placeholder="Event title">
        </label>
        <label>Summary
          <input type="text" id="summary" placeholder="Short description (optional)">
        </label>
        <label>Starts at
          <input type="datetime-local" id="startsAt" required>
        </label>
        <button class="btn btn-primary" type="submit">Create Event</button>
      </form>
    </section>

    <section class="card" style="margin-top:16px">
      <h2>Upcoming Events</h2>
      <div id="eventsList" class="cards" style="margin-top:16px"></div>
    </section>
  </main>

  <footer class="site-footer">
    &copy; <span id="year"></span> Rowan ACDA. All rights reserved.
  </footer>
  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
